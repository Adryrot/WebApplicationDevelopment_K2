<!DOCTYPE html>
<html>
<head>
    <title>User Profile Registration System</title>
</head>
<body>
    <h2>System Account Creation Profiles</h2>
    <form action="processUser.jsp" method="POST">
        <table border="0">
            <tr>
                <td>Preferred Username:</td>
                <td><input type="text" name="username" maxlength="15" required /></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="password" maxlength="10" required /></td>
            </tr>
            <tr>
                <td>First Name:</td>
                <td><input type="text" name="firstname" required /></td>
            </tr>
            <tr>
                <td>Last Name:</td>
                <td><input type="text" name="lastname" required /></td>
            </tr>
            <tr>
                <td colspan="2" align="right">
                    <input type="submit" value="Register User Profile Account" />
                </td>
            </tr>
        </table>
    </form>
    <p><a href="login.jsp">Already have an account? Login here</a></p>
</body>
</html>
